---

networks:
  sentry-private:
    # NOTE: This network needs to be manually created and needs to
    #       be configured for manual container attachment
    external: true

services:
  # -- MAIN SERVICE --
  manager:
    image: ghcr.io/josh5/sentry-docker-swarm:latest
    build:
      context: docker
      dockerfile: Dockerfile
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 60s
      placement:
        constraints:
          - ${PLACEMENT_CONSTRAINT}
    environment:
      NETWORK_NAME: sentry-private
      DOCKER_VERSION: ${DOCKER_VERSION:-}
      # Releases:
      #   https://github.com/getsentry/self-hosted/releases
      SENTRY_VERSION: ${SENTRY_VERSION:?}
      SENTRY_BEACON_DISABLED: ${SENTRY_BEACON_DISABLED}
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY}
      SENTRY_URL_PREFIX: ${SENTRY_URL_PREFIX}
      SENTRY_CUSTOM_DB_CONFIG: ${SENTRY_CUSTOM_DB_CONFIG}
      SENTRY_DB_NAME: ${SENTRY_DB_NAME}
      SENTRY_DB_USER: ${SENTRY_DB_USER}
      SENTRY_DB_PASSWORD: ${SENTRY_DB_PASSWORD}
      SENTRY_POSTGRES_HOST: ${SENTRY_POSTGRES_HOST}
      SENTRY_POSTGRES_PORT: ${SENTRY_POSTGRES_PORT}
      FORCE_NODESTORE_READ_THROUGH: ${FORCE_NODESTORE_READ_THROUGH:-false}
      FORCE_NODESTORE_DELETE_THROUGH: ${FORCE_NODESTORE_DELETE_THROUGH:-false}
      SENTRY_EVENT_RETENTION_DAYS: ${SENTRY_EVENT_RETENTION_DAYS:-90}
      SENTRY_TASKWORKER_CONCURRENCY: ${SENTRY_TASKWORKER_CONCURRENCY:-}
      LAUNCHPAD_TASKWORKER_CONCURRENCY: ${LAUNCHPAD_TASKWORKER_CONCURRENCY:-}
      LAUNCHPAD_RPC_SHARED_SECRET: ${LAUNCHPAD_RPC_SHARED_SECRET:-}
      SENTRY_KAFKA_MAX_POLL_INTERVAL_MS: ${SENTRY_KAFKA_MAX_POLL_INTERVAL_MS:-}
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-}
      KAFKA_LOG_RETENTION_BYTES: ${KAFKA_LOG_RETENTION_BYTES:-}
      KAFKA_LOG_SEGMENT_BYTES: ${KAFKA_LOG_SEGMENT_BYTES:-}
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: ${KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS:-}
      KAFKA_LOG_SEGMENT_DELETE_DELAY_MS: ${KAFKA_LOG_SEGMENT_DELETE_DELAY_MS:-}
      KAFKA_LOG_CLEANER_ENABLE: ${KAFKA_LOG_CLEANER_ENABLE:-}
      KAFKA_LOG_CLEANUP_POLICY: ${KAFKA_LOG_CLEANUP_POLICY:-}
      SENTRY_LOG_FORMAT: ${SENTRY_LOG_FORMAT:-}
      SENTRY_COMPOSE_PROFILES: ${SENTRY_COMPOSE_PROFILES:-feature-complete}
      SENTRY_CUSTOM_MAIL_SERVER_CONFIG: ${SENTRY_CUSTOM_MAIL_SERVER_CONFIG}
      SENTRY_EMAIL_HOST: ${SENTRY_EMAIL_HOST}
      SENTRY_EMAIL_PORT: ${SENTRY_EMAIL_PORT}
      SENTRY_EMAIL_USER: ${SENTRY_EMAIL_USER}
      SENTRY_EMAIL_PASSWORD: ${SENTRY_EMAIL_PASSWORD}
      SENTRY_EMAIL_USE_TLS: ${SENTRY_EMAIL_USE_TLS}
      SENTRY_EMAIL_USE_SSL: ${SENTRY_EMAIL_USE_SSL}
      SENTRY_SERVER_EMAIL: ${SENTRY_SERVER_EMAIL}
      SENTRY_MAIL_HOST: ${SENTRY_MAIL_HOST}
      SENTRY_GITHUB_LOGIN_EXTENDED_PERMISSIONS: ${SENTRY_GITHUB_LOGIN_EXTENDED_PERMISSIONS:-repo}
      SENTRY_GITHUB_APP_ID: ${SENTRY_GITHUB_APP_ID:-}
      SENTRY_GITHUB_APP_NAME: ${SENTRY_GITHUB_APP_NAME:-}
      SENTRY_GITHUB_APP_WEBHOOK_SECRET: ${SENTRY_GITHUB_APP_WEBHOOK_SECRET:-}
      SENTRY_GITHUB_APP_CLIENT_ID: ${SENTRY_GITHUB_APP_CLIENT_ID:-}
      SENTRY_GITHUB_APP_CLIENT_SECRET: ${SENTRY_GITHUB_APP_CLIENT_SECRET:-}
      SENTRY_GITHUB_APP_PRIVATE_KEY: ${SENTRY_GITHUB_APP_PRIVATE_KEY:-}
      SENTRY_FILESTORE_BACKEND_S3_BUCKET: ${SENTRY_FILESTORE_BACKEND_S3_BUCKET}
      SENTRY_INITIAL_ADMIN_EMAIL: ${SENTRY_INITIAL_ADMIN_EMAIL}
      ADDITIONAL_APT_PACKAGES: ${ADDITIONAL_APT_PACKAGES}
      ADDITIONAL_PYTHON_MODULES: ${ADDITIONAL_PYTHON_MODULES}
      SENTRY_CONF_CUSTOM: ${SENTRY_CONF_CUSTOM}
      SENTRY_ENV_CUSTOM: ${SENTRY_ENV_CUSTOM}
      SENTRY_DATA_PATH: ${SENTRY_DATA_PATH}
      BACKUP_VOLUMES_ON_UPDATE: ${BACKUP_VOLUMES_ON_UPDATE:-false}
      EXEC_NUCLEAR_CLEAN: ${EXEC_NUCLEAR_CLEAN:-false}
      FORCE_RUN_INSTALL_SCRIPT: ${FORCE_RUN_INSTALL_SCRIPT:-}
      SKIP_ADMIN_USER_CREATE: ${SKIP_ADMIN_USER_CREATE:-false}
      ALWAYS_FORCE_RECREATE: ${ALWAYS_FORCE_RECREATE:-false}
      WEB_ONLY_MAINTENANCE_MODE: ${WEB_ONLY_MAINTENANCE_MODE:-false}
      DEPLOYMENT_ID: ${DEPLOYMENT_ID:-default}
      KEEP_ALIVE: ${KEEP_ALIVE:-true}
      ENABLE_LOG_MONITOR: ${ENABLE_LOG_MONITOR:-true}
      EXIT_ON_ERRORS_IN_LOGS: ${EXIT_ON_ERRORS_IN_LOGS:-false}
      NOTIFY_DISCORD_FOR_ERRORS_IN_LOGS: ${NOTIFY_DISCORD_FOR_ERRORS_IN_LOGS:-}
      DIND_CPU_SHARES: ${DIND_CPU_SHARES:-512}
      DIND_CPU_PERCENT: ${DIND_CPU_PERCENT:-75}
      DIND_MEMLIMIT: ${DIND_MEMLIMIT:-0}
      REDIS_MEMLIMIT: ${REDIS_MEMLIMIT:-0}
      REDIS_MAXMEMORY_POLICY: ${REDIS_MAXMEMORY_POLICY:-volatile-lru}
      CUSTOM_LOG_DRIVER: ${CUSTOM_LOG_DRIVER:-local}
      FLUENTD_FORWARD_ADDRESS: ${FLUENTD_FORWARD_ADDRESS:-}
      FLUENTD_FORWARD_SHARED_KEY: ${FLUENTD_FORWARD_SHARED_KEY:-1234567890qwertyuiop}
      FLUENTD_FORWARD_USE_TLS: ${FLUENTD_FORWARD_USE_TLS:-true}
      FLUENTD_FORWARD_VERIFY_CERT: ${FLUENTD_FORWARD_VERIFY_CERT:-false}
      FLUENTD_FORWARD_VERIFY_CERT_HOSTNAME: ${FLUENTD_FORWARD_VERIFY_CERT_HOSTNAME:-false}
      FLUENTD_HTTP_ADDRESS: ${FLUENTD_HTTP_ADDRESS:-}
      FLUENTD_TAG: ${FLUENTD_TAG:-}
      FLUENTD_ADDITIONAL_SOURCE_TAGS: ${FLUENTD_ADDITIONAL_SOURCE_TAGS:-}
      SENTRY_INGEST_FILTER_ENABLED: ${SENTRY_INGEST_FILTER_ENABLED:-false}
      SENTRY_INGEST_FILTER_MODE: ${SENTRY_INGEST_FILTER_MODE:-observe}
      SENTRY_INGEST_FILTER_WINDOW_MINUTES: ${SENTRY_INGEST_FILTER_WINDOW_MINUTES:-1440}
      SENTRY_INGEST_FILTER_MAX_EVENTS_PER_SIGNATURE: ${SENTRY_INGEST_FILTER_MAX_EVENTS_PER_SIGNATURE:-5000}
      SENTRY_INGEST_FILTER_SAMPLE_RATE_AFTER_LIMIT: ${SENTRY_INGEST_FILTER_SAMPLE_RATE_AFTER_LIMIT:-0.01}
      SENTRY_INGEST_FILTER_INCLUDE_ENVIRONMENT: ${SENTRY_INGEST_FILTER_INCLUDE_ENVIRONMENT:-true}
      SENTRY_INGEST_FILTER_INCLUDE_RELEASE: ${SENTRY_INGEST_FILTER_INCLUDE_RELEASE:-false}
      SENTRY_INGEST_FILTER_TRIM_MAX_BREADCRUMBS: ${SENTRY_INGEST_FILTER_TRIM_MAX_BREADCRUMBS:-5}
      SENTRY_INGEST_FILTER_SNAPSHOT_INTERVAL: ${SENTRY_INGEST_FILTER_SNAPSHOT_INTERVAL:-1m}
      SENTRY_INGEST_FILTER_METRIC_LOG_INTERVAL: ${SENTRY_INGEST_FILTER_METRIC_LOG_INTERVAL:-1m}
      SENTRY_INGEST_FILTER_BUFFER_ENABLED: ${SENTRY_INGEST_FILTER_BUFFER_ENABLED:-false}
      SENTRY_INGEST_FILTER_BUFFER_MAX_BYTES: ${SENTRY_INGEST_FILTER_BUFFER_MAX_BYTES:-1073741824}
      SENTRY_INGEST_FILTER_RETRY_INITIAL_BACKOFF: ${SENTRY_INGEST_FILTER_RETRY_INITIAL_BACKOFF:-5s}
      SENTRY_INGEST_FILTER_RETRY_MAX_BACKOFF: ${SENTRY_INGEST_FILTER_RETRY_MAX_BACKOFF:-2m}
      SENTRY_INGEST_FILTER_RETRY_SWEEP_INTERVAL: ${SENTRY_INGEST_FILTER_RETRY_SWEEP_INTERVAL:-5s}
      SENTRY_INGEST_FILTER_LOG_DECISIONS: ${SENTRY_INGEST_FILTER_LOG_DECISIONS:-false}
      SENTRY_INGEST_FILTER_DEBUG: ${SENTRY_INGEST_FILTER_DEBUG:-false}
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: ${SENTRY_DATA_PATH}
        target: ${SENTRY_DATA_PATH}

  # -- REVERSE PROXY --
  proxy:
    image: library/nginx:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      placement:
        constraints:
          - ${PLACEMENT_CONSTRAINT}
      labels:
        #### -- Enable traefik router for this service
        - "traefik.enable=true"
        - "traefik.http.services.swarm-sentry.loadbalancer.server.port=80"
        - "traefik.http.routers.swarm-sentry.entrypoints=web"
        # Configure router domain
        - "traefik.http.routers.swarm-sentry.rule=Host(`${TRAEFIK_DOMAIN}`)"
    environment:
      NETWORK_NAME: sentry-private
      SENTRY_DATA_PATH: ${SENTRY_DATA_PATH}
    volumes:
      - type: bind
        source: ${SENTRY_DATA_PATH}
        target: ${SENTRY_DATA_PATH}
    networks:
      - sentry-private
    ports:
      - target: 80
        published: 9080
        mode: host
    entrypoint: "sh"
    command: |
      -c '
      set -e

      dind_continer_name="sentry-swarm-dind"

      echo "Waiting for Sentry manager container..."
      sleep 5
      i=1
      while [ $$i -le 60 ]; do
        if [ -f "$${SENTRY_DATA_PATH:?}/self_hosted/.z-manager-service-running.txt" ]; then
            echo "  - The Sentry manager container is running"
            break
        fi
        echo "  - Sentry manager container check #$$i - Not yet running. Recheck in 10 seconds..."
        sleep 10
        i=$$((i + 1))
      done
      echo

      echo "Configuring Nginx proxy..."
      if [ ! -f "$${SENTRY_DATA_PATH:?}/self_hosted/nginx/nginx.conf" ]; then
        echo "  - Nginx Config does not yet exist. Exit!"
        exit 1
      fi
      cp -fv "$${SENTRY_DATA_PATH:?}/self_hosted/nginx/nginx.conf" "/etc/nginx/nginx.conf"
      sed -i "s|server sentry-ingest-filter|server $${dind_continer_name:?}|" "/etc/nginx/nginx.conf"
      sed -i "s|server relay|server $${dind_continer_name:?}|" "/etc/nginx/nginx.conf"
      sed -i "s|server web|server $${dind_continer_name:?}|" "/etc/nginx/nginx.conf"
      cat /etc/nginx/nginx.conf
      echo

      echo "Running Nginx entrypoint..."
      /docker-entrypoint.sh nginx -g "daemon off;" 
      echo
      '
