<system>
    workers 2
</system>

<source>
    @type   forward
    @id     input1
    @label  @SENTRY
    port    24224
    tag    <FLUENTD_TAG>
</source>

<label @SENTRY>
    <filter **>
        @type record_transformer
        enable_ruby
        <record>
            log_type ${record["source"]}
            source "sentry"
            source.container_name ${record["container_name"].gsub(/^\/+/, '')}
            message ${record["log"]}

            # Dynamically adding records from FLUENTD_ADDITIONAL_SOURCE_TAGS
            # <FLUENTD_ADDITIONAL_SOURCE_TAGS>
        </record>
        remove_keys container_name,log
    </filter>

    # Store raw message for fallback
    <filter **>
        @type record_transformer
        enable_ruby
        <record>
            raw_message ${record["message"]}
        </record>
    </filter>

    # Parse and format Snuba logs
    <filter **snuba**>
        @type parser
        key_name message
        reserve_data true
        emit_invalid_record_to_error false
        <parse>
            @type json
        </parse>
    </filter>

    <filter **snuba**>
        @type record_transformer
        enable_ruby
        <record>
            message ${record["message"] || record["fields.message"] || (record["fields"] && record["fields"]["message"])}
        </record>
    </filter>

    # Parse and format Web service logs
    <filter **web**>
        @type parser
        key_name message
        reserve_data true
        emit_invalid_record_to_error false
        <parse>
            @type json
        </parse>
    </filter>

    <filter **web**>
        @type record_transformer
        enable_ruby
        <record>
            message ${if record["method"] && record["path"]; "#{record['method']} #{record['path']} -> #{record['response']} (#{record['request_duration_seconds']}s)"; else; record["message"]; end}
        </record>
    </filter>

    # Parse and format Taskworker logs
    <filter **taskworker**>
        @type parser
        key_name message
        reserve_data true
        emit_invalid_record_to_error false
        <parse>
            @type json
        </parse>
    </filter>

    <filter **taskworker**>
        @type record_transformer
        enable_ruby
        <record>
            message ${if record["event"]; msg = "event: #{record['event']}"; msg += " (reason: #{record['reason']})" if record["reason"]; msg += " (model: #{record['model']})" if record["model"]; msg; else; record["message"]; end}
        </record>
    </filter>

    # Parse logfmt for sentry-ingest-filter logs
    <filter **sentry-ingest-filter**>
        @type parser
        key_name message
        reserve_data true
        emit_invalid_record_to_error false
        <parse>
            @type logfmt
        </parse>
    </filter>

    <filter **sentry-ingest-filter**>
        @type record_transformer
        enable_ruby
        <record>
            message ${record["message"] || record["msg"]}
        </record>
    </filter>

    # Fallback: Parse other JSON logs that might be structured
    <filter **>
        @type parser
        key_name message
        reserve_data true
        emit_invalid_record_to_error false
        <parse>
            @type json
        </parse>
    </filter>

    # Fallback message constructor for any remaining parsed records
    <filter **>
        @type record_transformer
        enable_ruby
        <record>
            message ${record["message"] && !record["message"].to_s.empty? ? record["message"] : (record["msg"] || record["raw_message"])}
        </record>
        remove_keys raw_message,msg
    </filter>

    <match **>
        @type copy
        # <FLUENTD_FWD_CONFIG>
        # <FLUENTD_HTTP_CONFIG>
        # <FLUENTD_STDOUT_CONFIG>
    </match>
</label>
