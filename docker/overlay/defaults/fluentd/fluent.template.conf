<system>
    workers 2
</system>

<source>
    @type   forward
    @id     input1
    @label  @SENTRY
    port    24224
</source>

<label @SENTRY>
    <filter **>
        @type record_transformer
        enable_ruby
        <record>
            log_type ${record["source"]}
            source "sentry"
            source.container_name ${record["container_name"].gsub(/^\/+/, '')}
            message ${record["log"]}

            # Dynamically adding records from FLUENTD_ADDITIONAL_SOURCE_TAGS
            # <FLUENTD_ADDITIONAL_SOURCE_TAGS>
        </record>
        remove_keys container_name,log
    </filter>

    # Parse and format Snuba logs
    <filter **snuba**>
        @type parser
        key_name message
        reserve_data true
        remove_key_name_field true
        emit_invalid_record_to_error false
        <parse>
            @type json
        </parse>
    </filter>

    <filter **snuba**>
        @type record_transformer
        enable_ruby
        <record>
            message ${record["fields.message"] || (record["fields"].is_a?(Hash) && record["fields"]["message"]) || (record["module"] && record["event"] ? record["module"].to_s + ": " + record["event"].to_s : nil) || record["event"] || record["target"] || record["message"]}
        </record>
    </filter>

    # Parse and format Web service logs
    <filter **web**>
        @type parser
        key_name message
        reserve_data true
        remove_key_name_field true
        emit_invalid_record_to_error false
        <parse>
            @type json
        </parse>
    </filter>

    <filter **web**>
        @type record_transformer
        enable_ruby
        <record>
            message ${if record["method"] && record["path"]; record["method"].to_s + " " + record["path"].to_s + " -> " + record["response"].to_s + " (" + record["request_duration_seconds"].to_s + "s)"; else; record["message"]; end}
        </record>
    </filter>

    # Parse and format Taskworker logs
    <filter **taskworker**>
        @type parser
        key_name message
        reserve_data true
        remove_key_name_field true
        emit_invalid_record_to_error false
        <parse>
            @type json
        </parse>
    </filter>

    <filter **taskworker**>
        @type record_transformer
        enable_ruby
        <record>
            message ${if record["event"]; msg = "event: " + record["event"].to_s; msg += " (reason: " + record["reason"].to_s + ")" if record["reason"]; msg += " (model: " + record["model"].to_s + ")" if record["model"]; msg; else; record["message"]; end}
        </record>
    </filter>

    # Parse logfmt for sentry-ingest-filter logs
    <filter **sentry-ingest-filter**>
        @type parser
        key_name message
        reserve_data true
        remove_key_name_field true
        emit_invalid_record_to_error false
        <parse>
            @type logfmt
        </parse>
    </filter>

    <filter **sentry-ingest-filter**>
        @type record_transformer
        enable_ruby
        <record>
            message ${if record["log_type"] || record["action"] || record["title"]; parts = []; parts << record["log_type"].to_s if record["log_type"]; parts << record["action"].to_s if record["action"]; parts << record["title"].to_s if record["title"]; parts << "count=" + record["count"].to_s if record["count"]; parts << "limit=" + record["limit"].to_s if record["limit"]; parts << "environment=" + record["environment"].to_s if record["environment"]; parts.join(" "); else; record["message"] || record["msg"]; end}
        </record>
    </filter>

    # Parse other JSON logs that might be structured
    <filter **>
        @type parser
        key_name message
        reserve_data true
        remove_key_name_field true
        emit_invalid_record_to_error false
        <parse>
            @type json
        </parse>
    </filter>

    # Minimal catch-all promotion for common structured log keys.
    <filter **>
        @type record_transformer
        enable_ruby
        <record>
            message ${record["message"] || record["msg"] || record["fields.message"] || (record["fields"].is_a?(Hash) && record["fields"]["message"]) || record["event"]}
        </record>
        remove_keys msg
    </filter>

    <match **>
        @type copy
        # <FLUENTD_FWD_CONFIG>
        # <FLUENTD_HTTP_CONFIG>
        # <FLUENTD_STDOUT_CONFIG>
    </match>
</label>
