<system>
    workers 2
</system>

<source>
    @type   forward
    @id     input1
    @label  @SENTRY
    port    24224
    tag    <FLUENTD_TAG>
</source>

<label @SENTRY>
    <filter **>
        @type record_transformer
        enable_ruby
        <record>
            log_type ${record["source"]}
            source "sentry"
            source.container_name ${record["container_name"].gsub(/^\/+/, '')}
            message ${record["log"]}

            # Dynamically adding records from FLUENTD_ADDITIONAL_SOURCE_TAGS
            # <FLUENTD_ADDITIONAL_SOURCE_TAGS>
        </record>
        remove_keys container_name,log
    </filter>

    # Parse logfmt for sentry-ingest-filter logs
    <filter **sentry-ingest-filter**>
        @type parser
        key_name message
        reserve_data true
        emit_invalid_record_to_error false
        <parse>
            @type logfmt
        </parse>
    </filter>

    # If logfmt parsing extracted a 'msg' field, override 'message' with it and clean up 'msg'
    <filter **sentry-ingest-filter**>
        @type record_transformer
        enable_ruby
        <record>
            message ${record["msg"] || record["message"]}
        </record>
        remove_keys msg
    </filter>

    <match **>
        @type copy
        # <FLUENTD_FWD_CONFIG>
        # <FLUENTD_HTTP_CONFIG>
        # <FLUENTD_STDOUT_CONFIG>
    </match>
</label>
